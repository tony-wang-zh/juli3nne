
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>3D Print Part Manager</title>
    <style>
        body { font-family: sans-serif; padding: 20px; background: #f4f4f4; }
        .container { max-width: 900px; margin: auto; background: white; padding: 20px; border-radius: 8px; box-shadow: 0 2px 5px rgba(0,0,0,0.1); }
        .row { display: flex; align-items: center; padding: 10px; border: 1px solid #ddd; margin-bottom: 5px; background: #fff; cursor: default; }
        .row.dragging { opacity: 0.5; background: #e0e0e0; }
        .handle { cursor: grab; margin-right: 15px; font-size: 20px; color: #888; }
        .index { width: 30px; font-weight: bold; }
        .filename { 
            width: 200px; /* Give it a fixed width or use margin-right */
            margin-right: 20px;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }
        .controls { display: flex; 
            gap: 10px; 
            align-items: center;
            flex-grow: 1; /* This will now fill the remaining space to the right */
            justify-content: flex-start; /* Keeps everything inside (dropdown + inputs) on the left */
        }
        .dynamic-inputs { display: flex; gap: 5px; }
        input[type="number"], select { padding: 5px; border: 1px solid #ccc; border-radius: 4px; }
        .delete-btn { color: white; background: #ff4d4d; border: none; padding: 5px 10px; cursor: pointer; border-radius: 4px; margin-left: auto;}
        .footer { margin-top: 20px; border-top: 2px solid #eee; padding-top: 20px; }
        .hidden { display: none; }
    </style>
</head>
<body>

<div class="container">
    <h2>3D Print Job Configurator</h2>
    <button type="button" onclick="document.getElementById('file-input').click()">Add STL File</button>
    <input type="file" id="file-input" class="hidden" accept=".stl" multiple onchange="handleFiles(this.files)">

    <form id="print-form" action="/upload" method="POST" enctype="multipart/form-data">
        <div id="part-list">
            </div>

        <div class="footer">
            <input type="number" step="0.01" name="z_offset" placeholder="Z offset" required>
            <button type="submit">Upload</button>
            <div style="margin-top:10px;">
                <textarea placeholder="placeholder" rows="4" style="width:100%"></textarea>
            </div>
        </div>
    </form>
</div>

<script>
    const partList = document.getElementById('part-list');
    let fileStore = []; // Keeps track of File objects

    function handleFiles(files) {
        for (let file of files) {
            const rowId = Date.now() + Math.random();
            fileStore.push({ id: rowId, file: file });
            addRow(file.name, rowId);
        }
        updateIndices();
    }

    function addRow(name, id) {
        const row = document.createElement('div');
        row.className = 'row';
        row.draggable = true;
        row.dataset.id = id;

        row.innerHTML = `
            <div class="handle">☰</div>
            <div class="index">0</div>
            <div class="filename">${name}</div>
            <div class="controls">
                <select name="tool_type" onchange="updateInputs(this)">
                    <option value="syringe">Syringe</option>
                    <option value="liquid spray">Liquid Spray</option>
                    <option value="powder spray">Powder Spray</option>
                    <option value="solid block">Solid Block</option>
                </select>
                <div class="dynamic-inputs"></div>
                <button type="button" class="delete-btn" onclick="removeRow(this, ${id})">Delete</button>
            </div>
            <input type="hidden" name="file_id" value="${id}">
        `;
        
        partList.appendChild(row);
        updateInputs(row.querySelector('select'));
        setupDragEvents(row);
    }

    function updateInputs(select) {
        const container = select.parentElement.querySelector('.dynamic-inputs');
        const type = select.value;
        container.innerHTML = '';

        container.style.display = 'flex';
        container.style.justifyContent = 'flex-start';

        if (type === 'syringe') {
            container.innerHTML = `
                <input type="number" name="tool_index" placeholder="tool index" required>
                <input type="number" step="0.01" name="ext_mult" placeholder="extrusion multiplier" required>
                <input type="number" name="init_offset" placeholder="initial offset" required>
            `;
        } else if (type === 'liquid spray' || type === 'powder spray') {
            container.innerHTML = `<input type="number" step="0.01" name="spray_offset" placeholder="spray height offset" required>`;
        } else if (type === 'solid block') {
            container.innerHTML = `<input type="number" step="0.01" name="block_height" placeholder="block height" required>`;
        }
    }

    function removeRow(btn, id) {
        btn.closest('.row').remove();
        fileStore = fileStore.filter(f => f.id !== id);
        updateIndices();
    }

    function updateIndices() {
        const rows = Array.from(partList.querySelectorAll('.row'));
        rows.reverse().forEach((row, i) => {
            row.querySelector('.index').innerText = i + 1;
        });
    }

    // --- Drag and Drop Logic ---
    let dragSrcEl = null;

    function setupDragEvents(row) {
        row.addEventListener('dragstart', function(e) {
            dragSrcEl = this;
            this.classList.add('dragging');
            e.dataTransfer.effectAllowed = 'move';
        });

        row.addEventListener('dragover', function(e) {
            e.preventDefault();
            return false;
        });

        row.addEventListener('drop', function(e) {
            if (dragSrcEl !== this) {
                const allRows = Array.from(partList.querySelectorAll('.row'));
                const dragIdx = allRows.indexOf(dragSrcEl);
                const dropIdx = allRows.indexOf(this);

                if (dragIdx < dropIdx) {
                    this.after(dragSrcEl);
                } else {
                    this.before(dragSrcEl);
                }
                updateIndices();
            }
        });

        row.addEventListener('dragend', function() {
            this.classList.remove('dragging');
        });
    }

    // Intercept submit to attach files in correct order
    document.getElementById('print-form').onsubmit = function(e) {
        e.preventDefault();
        const formData = new FormData(this);
        
        // Remove existing generic entries to rebuild them in order
        formData.delete('file_id'); 
        
        const orderedRows = Array.from(partList.querySelectorAll('.row')).reverse();

        const finalData = new FormData();
        
        orderedRows.forEach(row => {
            const id = parseFloat(row.dataset.id);
            const fileObj = fileStore.find(f => f.id === id).file;
            finalData.append('stl_files', fileObj);
            
            // Collect inputs for this specific row
            const config = {
                type: row.querySelector('select').value,
                params: {}
            };
            row.querySelectorAll('.dynamic-inputs input').forEach(input => {
                config.params[input.name] = input.value;
            });
            
            finalData.append('configs', JSON.stringify(config));
        });

        finalData.append('z_offset', formData.get('z_offset'));

        fetch('/upload', { method: 'POST', body: finalData })
            .then(res => res.text())
            .then(txt => alert('Server says: ' + txt));
    };
</script>

</body>
</html>
